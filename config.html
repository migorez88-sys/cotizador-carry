<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Configuración Carry</title>
        <link rel="stylesheet" href="global.css">
        <link rel="stylesheet" href="config.css">
    </head>
    <body>
        <form id="form_tarifas" class="tarjeta_modulo">
            <a href="index.html" class="btn_home_tarjeta" title="Volver al Inicio">🏠</a>
            <h2>Matriz de Costos Técnicos ⚙️</h2>
            <p>Ajusta los valores de operación de la Suzuki Carry</p>
            <div class="input_group">
                <label for="tarifa_base">Tarifa Mínima ($): </label>
                <input type="number" 
                       id="tarifa_base"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="Ej: 15000" 
                       step="1000" 
                       min="0">
            </div>
            <div class="input_group">
                <label for="costo_comb">Costo Galón de Gasolina Actual ($):</label>
                <input type="number" 
                       id="costo_comb"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="16300" 
                       step="100" 
                       min="0">
            </div>
            <div class="input_group">
                <label for="hora_lab">Valor Hora Laboral Actual ($):</label>
                <input type="number" 
                       id="hora_lab"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="18000" 
                       step="100" 
                       min="0">
            </div>
            <div class="input_group">
                <label for="precio_km">Precio Base por Kilómetro ($):</label>
                <input type="number" 
                       id="precio_km"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="570" 
                       step="10" 
                       min="0">
            </div>
            <div class="input_group">
                <label for="consumo_actual">Consumo Actual (kms/galón):</label>
                <input type="number" 
                       id="consumo_actual"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="33" 
                       step="1" 
                       min="0">
            </div>
            <button type="submit" class="main_btn">💾 Guardar Confiiguración</button>
        </form>
        <!--    Base de datos con filtro de carga obligatoria y ordenada (defer)
                El atributo defer cumple dos funciones críticas en html/javascript
                que la asincronía de la base de datos no puede resolver por sí sola:
                1. Garantiza el orden estricto de lectura (La Fila India)Como tu código
                está dividido en tres archivos que se necesitan entre sí, el navegador debe leerlos
                en un orden perfecto. Al ponerle defer a los tres, le ordenas a Firefox que los descargue
                en paralelo pero los ejecute estrictamente en el orden en que los escribiste.
                2. Evita que el código se ejecute antes de que existan los cajones de texto.
                Llamados 100% locales: Funcionan sin internet -->
        <script defer src="localforage.min.js"></script>
        <script defer src="init_globals.js"></script>
        <!-- <script defer src="js/config.js"></script> -->
    </body>
</html>
