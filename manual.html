<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cotizador Manual</title>
        <link rel="stylesheet" href="global.css">
        <link rel="stylesheet" href="manual.css">
    </head>
    <body>
        <div class="tarjeta_modulo">
            <a href="index.html" class="btn_home_tarjeta" title="Volver al Inicio">🏠</a>
            <!-- Selector de Tráfico Discreto (Derecha) -->
            <select id="tipoTrafico_display" 
                    class="select_trafic" 
                    onchange="" 
                    title="Estado del Tráfico">
                <option title="tráfico liviano" value="valle">🛣️</option>
                <option title="tráfico pesado" value="pico">🚗</option>
            </select>
            <h2>Cotizador Super Carry</h2>
            <h3>Distancias Conocidas</h3>
            <div class="row_header">
                <div>Fase del Viaje</div>
                <div>Kilómetros</div>
                <div>Minutos</div>
            </div>
            <div class="grid_3">
                <label>🛫 Recogida:</label>
                <input title="Kms que recorres al ir a buscar una carga" 
                       type="number" 
                       id="kmsRecogida"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="0" 
                       step="0.1" 
                       value="" 
                       min="0">
                <input title="Tiempo gastado en buscar la carga (min)" 
                       type="number" 
                       id="minRecogida"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="0" 
                       step="1.0" 
                       value="" 
                       min="0">
            </div>
            <div class="grid_3">
                <label>🚚 Ruta Cargado:</label>
                <input title="Kms recorrido con la carga como tal" 
                       type="number" 
                       id="kmsCargado"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="0" 
                       step="0.1" 
                       value="" 
                       min="0">
                <input title="Tiempo gastado en el traslado de la carga en sí" 
                       type="number" 
                       id="minCargado"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="0" 
                       step="1.0" 
                       value="" 
                       min="0">
            </div>
            <div class="grid_3">
                <label>🛬 Retorno a Base:</label>
                <input title="Kms de vuelta a casa o sede principal" 
                       type="number" 
                       id="kmsRetorno"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="0" 
                       step="0.1" 
                       value="" 
                       min="0">
                <input title="Tiempo en regregar a base" 
                       type="number" 
                       id="minRetorno"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="0" 
                       step="1.0" 
                       value="" 
                       min="0">
            </div>
            <div class="input_group">
                <label for="tipoCarga_display">📦 Tipo de Carga / Rodamiento:</label>
                <select id="tipoCarga_display" 
                        onchange="">
                    <option value="suave">Suave</option>
                    <option value="moderada">Moderada</option>
                    <option value="sobredimensionada">Sobredimensionada</option>
                    <option value="critica">Crítica / Abrasiva</option>
                    <option value="pasajeros">Pasajeros</option>
                </select>
            </div>
            <div class="input_group">
                <label for="tipoOperacion_display">🌤️ Condición del Servicio:</label>
                <select id="tipoOperacion_display" 
                        onchange="">
                    <option value="normal">Tasa Normal (Sin recargo)</option>
                    <option value="nocturno">Horario Nocturno / Festivo (+35%)</option>
                    <option value="trocha">Terreno Difícil / Trocha (+25%)</option>
                    <option value="descuento">Cliente Frecuente (-10%)</option>
                </select>
            </div>
            <div class="section_title">Extras y Logística</div>
            <div class="input_group" style="grid-template-columns: 3fr 1fr;">
                <label for="extras">🤝 Recargos Extra (Cargue / Ayudante / Peajes):</label>
                <input type="number" 
                       id="extras"
                       onkeypress="filtrarSoloNumeros(event)"
                       placeholder="10,000" 
                       value="">
            </div>
            <button class="main_btn btn_calc" 
                    onclick="calcularDatosManuales()">
                🔍 Calcular Tarifa
            </button>
            <div class="loading" id="loadingMsg">🔄 Procesando datos de la ruta...</div>
            <div class="result_box" id="resultBox">
                <div class="total_highlight" id="totalTarifa_display">$0</div>
                <div class="summary_text" id="summaryText"></div>
                <button class="main_btn btn_copy" id="btnCopy" onclick="copiarWhatsApp()">📋 Copiar para WhatsApp</button>
            </div>
        </div>
        <!-- scripts siempre al pie de página (antes de cerrar body) para que cargue antes todas las dependencias
         1. Motor de Base de Datos Persistente (IndexedDB)
         Llamados 100% locales: Funcionan sin internet -->
<!--        <script defer src="./localforage.min.js"></script>-->
        <script defer src="./init_globals.js"></script>
        <script defer src="./init_modules.js"></script>
        <script defer src="./manual.js"></script>
    </body>
</html>
